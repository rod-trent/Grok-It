<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grok-it</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:              #0a0a0a;
      --surface:         #141414;
      --surface-raised:  #1c1c1c;
      --border:          #262626;
      --accent:          #6366f1;
      --accent-dim:      rgba(99,102,241,0.15);
      --accent-hover:    #4f52d6;
      --text-primary:    #f5f5f5;
      --text-secondary:  #a3a3a3;
      --text-muted:      #525252;
      --error:           #ef4444;
      --error-bg:        rgba(239,68,68,0.1);
      --success:         #22c55e;
      --user-bubble-bg:  #1a1a2e;
      --user-bubble-border: #312e81;
      --radius:          12px;
      --radius-sm:       8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      width: 480px;
      min-height: 200px;
      max-height: 600px;
      display: flex;
      flex-direction: column;
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ── Light mode (system preference) ── */
    @media (prefers-color-scheme: light) {
      :root {
        --bg:                 #ffffff;
        --surface:            #f5f5f5;
        --surface-raised:     #ebebeb;
        --border:             #e0e0e0;
        --text-primary:       #111111;
        --text-secondary:     #555555;
        --text-muted:         #999999;
        --error-bg:           rgba(220,38,38,0.08);
        --success-bg:         rgba(22,163,74,0.08);
        --user-bubble-bg:     #eef2ff;
        --user-bubble-border: #c7d2fe;
      }
    }

    /* ── Manual overrides via data-theme attribute ── */
    html[data-theme="light"] {
      --bg:                 #ffffff;
      --surface:            #f5f5f5;
      --surface-raised:     #ebebeb;
      --border:             #e0e0e0;
      --text-primary:       #111111;
      --text-secondary:     #555555;
      --text-muted:         #999999;
      --error-bg:           rgba(220,38,38,0.08);
      --success-bg:         rgba(22,163,74,0.08);
      --user-bubble-bg:     #eef2ff;
      --user-bubble-border: #c7d2fe;
    }
    html[data-theme="dark"] {
      --bg:                 #0a0a0a;
      --surface:            #141414;
      --surface-raised:     #1c1c1c;
      --border:             #262626;
      --text-primary:       #f5f5f5;
      --text-secondary:     #a3a3a3;
      --text-muted:         #525252;
      --error-bg:           rgba(239,68,68,0.1);
      --success-bg:         rgba(34,197,94,0.1);
      --user-bubble-bg:     #1a1a2e;
      --user-bubble-border: #312e81;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 11px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .header-icon { width: 18px; height: 18px; border-radius: 4px; }
    .header-title { font-weight: 600; font-size: 14px; letter-spacing: -0.01em; }
    .header-actions { display: flex; gap: 4px; }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 5px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
    }
    .icon-btn:hover { color: var(--text-primary); background: var(--surface-raised); }
    .icon-btn svg { width: 16px; height: 16px; }

    /* ── Progress bar ── */
    .progress-track {
      height: 2px;
      background: transparent;
      flex-shrink: 0;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #8b5cf6);
      border-radius: 1px;
      transition: width 0.3s ease;
    }
    .progress-bar.active { animation: progress-pulse 1.5s ease-in-out infinite; }
    @keyframes progress-pulse {
      0%   { width: 5%;  opacity: 1; }
      50%  { width: 85%; opacity: 0.8; }
      100% { width: 95%; opacity: 0.6; }
    }

    /* ── Page context badge ── */
    .page-context {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .page-favicon { width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0; }
    .page-title-text {
      font-size: 11px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .page-url-link {
      color: var(--text-muted);
      font-size: 11px;
      text-decoration: none;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .page-url-link:hover { color: var(--accent); }

    /* ── Conversation ── */
    .conversation {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 400px;
      scroll-behavior: smooth;
    }
    .conversation::-webkit-scrollbar { width: 4px; }
    .conversation::-webkit-scrollbar-track { background: transparent; }
    .conversation::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0);   }
    }
    .message { animation: fadeSlideIn 0.2s ease-out; }

    /* User bubble */
    .message-user { display: flex; justify-content: flex-end; }
    .bubble-user {
      background: var(--user-bubble-bg);
      border: 1px solid var(--user-bubble-border);
      border-radius: var(--radius) var(--radius) 4px var(--radius);
      padding: 9px 12px;
      max-width: 85%;
      font-size: 13px;
      color: #c7d2fe;
      word-break: break-word;
    }

    /* Assistant bubble */
    .message-assistant { display: flex; justify-content: flex-start; }
    .bubble-assistant {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) var(--radius) 4px;
      padding: 10px 12px;
      max-width: 95%;
      word-break: break-word;
    }
    .response-text {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-primary);
      white-space: pre-wrap;
    }
    .response-text.error-text { color: var(--error); }

    /* Streaming cursor */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    .streaming-cursor::after {
      content: "▋";
      display: inline;
      animation: blink 0.75s step-end infinite;
      color: var(--accent);
      margin-left: 1px;
    }

    /* Skeleton loading */
    .skeleton-wrap { display: flex; flex-direction: column; gap: 6px; padding: 2px 0; }
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, var(--surface-raised) 25%, #252525 50%, var(--surface-raised) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 3px;
      height: 13px;
    }
    .skeleton.w-full  { width: 100%; }
    .skeleton.w-3q    { width: 75%; }
    .skeleton.w-half  { width: 50%; }

    /* Bubble action buttons */
    .bubble-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .action-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 5px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .action-btn:hover { color: var(--text-primary); border-color: var(--text-muted); background: var(--surface-raised); }
    .action-btn.copied { color: var(--success); border-color: var(--success); }
    .action-btn svg { width: 11px; height: 11px; }

    /* ── History panel ── */
    .history-panel {
      position: absolute;
      inset: 0;
      background: var(--bg);
      z-index: 10;
      display: flex;
      flex-direction: column;
      animation: fadeSlideIn 0.15s ease-out;
    }
    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 13px;
      flex-shrink: 0;
    }
    .history-close-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 5px;
      transition: color 0.15s, background 0.15s;
    }
    .history-close-btn:hover { color: var(--text-primary); background: var(--surface-raised); }
    .history-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .text-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 5px;
      transition: background 0.15s, color 0.15s;
    }
    .text-btn.danger { color: var(--error); }
    .text-btn.danger:hover { background: var(--error-bg); }
    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .history-item {
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
    }
    .history-item:hover { background: var(--surface); border-color: var(--border); }
    .history-prompt {
      font-size: 12px;
      color: var(--text-primary);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-meta {
      display: flex;
      gap: 10px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .empty-state {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      padding: 40px 0;
    }

    /* ── Input area ── */
    .input-area {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .follow-up-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 13px;
      padding: 8px 10px;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 96px;
      overflow-y: auto;
      transition: border-color 0.15s;
    }
    .follow-up-input::placeholder { color: var(--text-muted); }
    .follow-up-input:focus { border-color: var(--accent); }
    .follow-up-input::-webkit-scrollbar { width: 3px; }
    .follow-up-input::-webkit-scrollbar-thumb { background: var(--border); }

    .send-btn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      cursor: pointer;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
    }
    .send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <img src="icon.png" class="header-icon" alt="">
      <span class="header-title">Grok-it</span>
    </div>
    <div class="header-actions">
      <button id="btn-history" class="icon-btn" title="Query history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
      </button>
      <button id="btn-options" class="icon-btn" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
          <path d="M12 2v2m0 16v2M2 12h2m16 0h2"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Stream progress bar -->
  <div class="progress-track">
    <div id="progress-bar" class="progress-bar"></div>
  </div>

  <!-- Page context badge (hidden until populated) -->
  <div id="page-context" class="page-context" style="display:none">
    <img id="page-favicon" class="page-favicon" src="" alt="" onerror="this.style.display='none'">
    <span id="page-title-text" class="page-title-text"></span>
    <a id="page-url-link" href="#" class="page-url-link" target="_blank" title="Open page">↗</a>
  </div>

  <!-- Conversation thread -->
  <div id="conversation" class="conversation"></div>

  <!-- History panel (overlay) -->
  <div id="history-panel" class="history-panel" style="display:none">
    <div class="history-header">
      <span>Recent Queries</span>
      <div class="history-controls">
        <button id="btn-clear-history" class="text-btn danger">Clear all</button>
        <button id="btn-history-close" class="history-close-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Close
        </button>
      </div>
    </div>
    <div id="history-list" class="history-list"></div>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <textarea id="follow-up-input"
              class="follow-up-input"
              placeholder="Ask a follow-up question…"
              rows="1"
              maxlength="4000"></textarea>
    <button id="btn-send" class="send-btn" disabled title="Send (Enter)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
